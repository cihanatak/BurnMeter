name: build-macos

# Builds the macOS .app + .dmg on GitHub's macOS runner (no Mac needed locally).
# - workflow_dispatch: manual test run → .dmg as a downloadable artifact.
# - release published: also attaches Burnmeter.dmg (+ versioned) to the release.
# UNSIGNED for now (Gatekeeper right-click→Open) until Apple Developer signing.

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build .app + .dmg
        run: bash packaging/build_mac.sh

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Burnmeter-macos
          path: dist/*.dmg
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/Burnmeter.dmg "dist/Burnmeter-${{ github.event.release.tag_name }}.dmg" --clobber || gh release upload "${{ github.event.release.tag_name }}" dist/Burnmeter.dmg --clobber
